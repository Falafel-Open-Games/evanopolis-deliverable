name: Deploy Rooms API To Fly.io

on:
  workflow_run:
    workflows:
      - Rooms API CI
    types:
      - completed
  workflow_dispatch:

env:
  FLY_APP: ${{ vars.FLY_ROOMS_API_APP }}

jobs:
  deploy:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push' &&
        github.event.workflow_run.head_branch == 'main'
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Sync Fly runtime configuration
        run: |
          flyctl secrets set \
            AUTH_BASE_URL="${AUTH_BASE_URL}" \
            AUTH_VERIFY_PATH="${AUTH_VERIFY_PATH}" \
            ALLOWED_ORIGINS="${ALLOWED_ORIGINS}" \
            PORT="${ROOMS_API_PORT}" \
            ROOMS_DATA_FILE="${ROOMS_API_DATA_FILE}" \
            -a "${FLY_APP}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          AUTH_BASE_URL: ${{ vars.AUTH_BASE_URL }}
          AUTH_VERIFY_PATH: ${{ vars.AUTH_VERIFY_PATH }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          ROOMS_API_PORT: ${{ vars.ROOMS_API_PORT }}
          ROOMS_API_DATA_FILE: ${{ vars.ROOMS_API_DATA_FILE }}

      - name: Deploy rooms api
        run: flyctl deploy --remote-only --config deploy/fly/rooms-api/fly.toml --app "${FLY_APP}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Enforce single active machine in IAD
        run: flyctl scale count 1 --region iad --max-per-region 1 --app "${FLY_APP}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
