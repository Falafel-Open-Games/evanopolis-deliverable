primary_region = "iad"
kill_signal = "SIGTERM"
kill_timeout = "30s"

[build]
dockerfile = "../../docker/rooms-api/Dockerfile"

[env]
AUTH_VERIFY_PATH = "/whoami"
PORT = "3001"

[deploy]
strategy = "rolling"
wait_timeout = "10m"

[[mounts]]
source = "rooms_data"
destination = "/data"

[[services]]
internal_port = 3001
protocol = "tcp"
auto_stop_machines = "off"
auto_start_machines = true
min_machines_running = 1

  [[services.ports]]
  handlers = ["http"]
  port = 80
  force_https = true

  [[services.ports]]
  handlers = ["tls", "http"]
  port = 443

  [[services.http_checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/healthz"
  protocol = "http"
  timeout = "5s"
